name: Deploy

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main]

jobs:

  check-worker:
    name: Type Check (Worker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm" }
      - run: npm ci
      - run: npx tsc --noEmit

  build-dashboard:
    name: Build Dashboard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm", cache-dependency-path: dashboard/package-lock.json }
      - run: npm ci
        working-directory: dashboard
      - run: npm run build
        working-directory: dashboard
        env:
          VITE_API_URL: ${{ github.ref == 'refs/heads/main' && secrets.WORKER_URL_PROD || secrets.WORKER_URL_STAGING }}
      - uses: actions/upload-artifact@v4
        with:
          name: dashboard-dist
          path: dashboard/dist

  deploy-worker:
    name: Deploy Worker → ${{ github.ref == 'refs/heads/main' && 'Production' || 'Staging' }}
    runs-on: ubuntu-latest
    needs: [check-worker]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging'
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: "npm" }
      - run: npm ci
      - run: ${{ github.ref == 'refs/heads/main' && 'npm run deploy' || 'npm run deploy:staging' }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy-dashboard:
    name: Deploy Dashboard → Pages
    runs-on: ubuntu-latest
    needs: [build-dashboard, deploy-worker]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with: { name: dashboard-dist, path: dashboard/dist }
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dashboard/dist --project-name=agentic-mcp-dashboard ${{ github.ref != 'refs/heads/main' && '--branch=staging' || '' }}

  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    needs: [deploy-worker]
    if: github.ref == 'refs/heads/main'
    steps:
      - run: |
          sleep 8
          curl -f ${{ secrets.WORKER_URL_PROD }}/health
